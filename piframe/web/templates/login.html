<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PiFrame — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100" style="background:#0d1117">
  <div class="card p-4 shadow" style="width:100%;max-width:380px;background:#161b22;border-color:#30363d">
    <h4 class="mb-4 text-center fw-bold">🖼 PiFrame</h4>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-danger py-2">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}
    <form method="post">
      <div class="mb-3">
        <input type="password" class="form-control" name="password"
               placeholder="Password" autofocus autocomplete="current-password">
      </div>
      <button class="btn btn-primary w-100" type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
