{% extends "base.html" %}
{% block title %}Dashboard — PiFrame{% endblock %}

{% block content %}
<div class="row g-4">

  <!-- Status card -->
  <div class="col-12 col-md-6 col-xl-4">
    <div class="card h-100">
      <div class="card-header fw-semibold"><i class="bi bi-display"></i> Now Showing</div>
      <div class="card-body d-flex flex-column gap-3">
        <div>
          <div class="text-secondary small mb-1">Photo</div>
          <div id="current-photo" class="fw-semibold text-truncate">—</div>
        </div>
        <div class="d-flex gap-4">
          <div>
            <div class="text-secondary small">Index</div>
            <span id="photo-index">—</span> / <span id="total-photos">—</span>
          </div>
          <div>
            <div class="text-secondary small">Status</div>
            <span id="status-badge" class="badge bg-success badge-pill">Playing</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Controls card -->
  <div class="col-12 col-md-6 col-xl-4">
    <div class="card h-100">
      <div class="card-header fw-semibold"><i class="bi bi-skip-forward"></i> Controls</div>
      <div class="card-body d-flex align-items-center justify-content-center gap-3 flex-wrap">
        <button class="btn btn-outline-secondary control-btn rounded-circle"
                onclick="control('prev')" title="Previous">
          <i class="bi bi-skip-start-fill"></i>
        </button>
        <button id="playpause-btn"
                class="btn btn-primary control-btn rounded-circle"
                onclick="control('toggle')" title="Play / Pause">
          <i class="bi bi-pause-fill"></i>
        </button>
        <button class="btn btn-outline-secondary control-btn rounded-circle"
                onclick="control('next')" title="Next">
          <i class="bi bi-skip-end-fill"></i>
        </button>
        <button class="btn btn-outline-secondary control-btn rounded-circle"
                onclick="control('reload')" title="Rescan photos folder">
          <i class="bi bi-arrow-clockwise"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Sync card -->
  <div class="col-12 col-xl-4">
    <div class="card h-100">
      <div class="card-header fw-semibold"><i class="bi bi-cloud-arrow-down"></i> OneDrive Sync</div>
      <div class="card-body d-flex flex-column gap-3">
        <div>
          <div class="text-secondary small mb-1">Status</div>
          <div id="sync-status">—</div>
        </div>
        <div>
          <div class="text-secondary small mb-1">Last sync</div>
          <div id="last-sync">—</div>
        </div>
        <div id="sync-section">
          <button class="btn btn-sm btn-outline-primary" onclick="syncNow()">
            <i class="bi bi-cloud-download"></i> Sync now
          </button>
        </div>
        <div id="onedrive-disabled" class="text-secondary small" style="display:none">
          OneDrive is disabled. Enable it in <a href="/settings">Settings</a>.
        </div>
      </div>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
  let paused = false;
  let onedriveEnabled = false;

  async function fetchStatus() {
    const r = await fetch('/api/status');
    const d = await r.json();
    paused = d.paused;
    onedriveEnabled = d.onedrive_enabled;

    document.getElementById('current-photo').textContent = d.current_photo || '—';
    document.getElementById('photo-index').textContent = d.photo_index;
    document.getElementById('total-photos').textContent = d.total_photos;

    const badge = document.getElementById('status-badge');
    badge.textContent = d.paused ? 'Paused' : 'Playing';
    badge.className = 'badge badge-pill ' + (d.paused ? 'bg-warning text-dark' : 'bg-success');

    const btn = document.getElementById('playpause-btn');
    btn.innerHTML = d.paused
      ? '<i class="bi bi-play-fill"></i>'
      : '<i class="bi bi-pause-fill"></i>';

    document.getElementById('sync-status').textContent = d.sync_status;
    document.getElementById('last-sync').textContent = d.last_sync;

    const syncSection = document.getElementById('sync-section');
    const noSync = document.getElementById('onedrive-disabled');
    if (d.onedrive_enabled) {
      syncSection.style.display = '';
      noSync.style.display = 'none';
      syncSection.querySelector('button').disabled = d.syncing;
      syncSection.querySelector('button').innerHTML = d.syncing
        ? '<span class="spinner-border spinner-border-sm"></span> Syncing…'
        : '<i class="bi bi-cloud-download"></i> Sync now';
    } else {
      syncSection.style.display = 'none';
      noSync.style.display = '';
    }
  }

  async function control(action) {
    await fetch('/api/control', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({action})
    });
    await fetchStatus();
  }

  async function syncNow() {
    await fetch('/api/sync', {method: 'POST'});
    await fetchStatus();
  }

  fetchStatus();
  setInterval(fetchStatus, 5000);
</script>
{% endblock %}
