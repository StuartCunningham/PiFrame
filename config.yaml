display:
  eink:
    model: '7.3'
    rotation: 0
    saturation: 0.5
  hdmi:
    background_color:
    - 0
    - 0
    - 0
    brightness: 1.0
    fullscreen: true
    height: 1080
    hide_cursor: true
    rotation: 0
    width: 1920
  mode: eink
fonts:
  global: dejavu-bold
onedrive:
  delete_local_removed: false
  enabled: false
  folder_path: /Pictures/PiFrame
  sync_interval: 3600
  sync_subfolders: false
  token_file: .piframe_token.json
overlays:
  clock:
    background: false
    background_opacity: 120
    color:
    - 255
    - 255
    - 255
    date_format: '%A, %-d %B'
    enabled: true
    font: ''
    font_size: 52
    position: bottom-right
    shadow: true
    show_date: true
    time_format: '%-H:%M'
  photo_info:
    color:
    - 220
    - 220
    - 220
    enabled: false
    font: ''
    font_size: 30
    position: bottom-center
    shadow: true
    show_date_taken: true
    show_filename: false
  weather:
    background: false
    background_opacity: 120
    color:
    - 255
    - 255
    - 255
    enabled: true
    font: ''
    font_size: 40
    position: bottom-left
    shadow: false
    show_icon: false
    units: imperial
    update_interval: 1800
schedule:
  enabled: false
  off_action: blank
  off_time: '22:00'
  on_time: 07:00
slideshow:
  fit_mode: fit
  interval: 60
  photo_dir: photos
  recursive: true
  shuffle: true
  supported_formats:
  - jpg
  - jpeg
  - png
  - bmp
  - gif
  - webp
  transition: fade
  video:
    enabled: false
    formats:
    - mp4
    - mov
    - avi
    - mkv
    - webm
    - m4v
    volume: 50
web:
  enabled: true
  host: 0.0.0.0
  port: 8080
